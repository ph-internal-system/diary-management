<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>マイページ | 日報管理</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
<link rel="stylesheet" href="css/flatpickr-theme.css" />
</head>
<body>
<header class="app-header">
  <h1>日報管理システム</h1>
  <div>
    <span id="user-email" class="hint"></span>
    <button type="button" class="btn btn-secondary" id="logout-btn" style="margin-left:12px;">ログアウト</button>
  </div>
</header>

<div class="app-layout">
  <main class="app-main">

    <section class="card">
      <h2>本日の進捗を入力</h2>
      <form id="entry-form">
        <div class="field-row">
          <div class="field">
            <label for="entry-date">日付<span class="required-mark">*</span></label>
            <input type="text" id="entry-date" required />
          </div>
          <div class="field">
            <label for="entry-leave">勤務状況<span class="required-mark">*</span></label>
            <select id="entry-leave" required>
              <option value="normal">通常勤務</option>
              <option value="am">午前休</option>
              <option value="pm">午後休</option>
              <option value="full">終日休</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="entry-tantou">担当（機能、画面名）<span class="required-mark">*</span>　※ 例）商品機能の登録画面</label>
          <input type="text" id="entry-tantou" required />
        </div>
        <div class="field">
          <label for="entry-progress">進捗率<span class="required-mark">*</span></label>
          <select id="entry-progress" required>
            <option value="0">0%</option>
            <option value="10">10%</option>
            <option value="20">20%</option>
            <option value="30">30%</option>
            <option value="40">40%</option>
            <option value="50">50%</option>
            <option value="60">60%</option>
            <option value="70">70%</option>
            <option value="80">80%</option>
            <option value="90">90%</option>
            <option value="100">100%</option>
          </select>
        </div>
        <div class="field">
          <label for="entry-status">作業状況および課題など<span class="required-mark">*</span></label>
          <textarea id="entry-status" required></textarea>
        </div>
        <div class="field">
          <label for="entry-learned">今日新しく学んだこと<span class="required-mark">*</span></label>
          <textarea id="entry-learned" required></textarea>
        </div>
        <div class="field">
          <label for="entry-tomorrow">明日の作業<span class="required-mark">*</span></label>
          <textarea id="entry-tomorrow" required></textarea>
        </div>
        <div class="field">
          <label for="entry-other">その他（任意）</label>
          <textarea id="entry-other"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">保存</button>
        <div class="error-text" id="entry-save-error"></div>
        <div class="hint" id="entry-save-message"></div>
      </form>
    </section>

    <section class="card">
      <h2>カレンダー</h2>
      <div class="calendar-nav">
        <button type="button" class="btn btn-secondary" id="prev-month">← 前月</button>
        <span class="month-label" id="month-label"></span>
        <button type="button" class="btn btn-secondary" id="next-month">次月 →</button>
      </div>
      <div id="calendar"></div>
    </section>

  </main>

  <aside class="app-sidebar">
    <section class="card">
      <h2>お知らせ</h2>

      <div class="notice-subsection">
        <h3>管理者からのお知らせ</h3>
        <ul id="announcement-list" class="notice-list"></ul>
        <p class="hint" id="announcement-empty">お知らせはありません。</p>
      </div>

      <div class="notice-subsection">
        <h3>リプライ通知</h3>
        <ul id="notice-list" class="notice-list"></ul>
        <p class="hint" id="notice-empty">新しいお知らせはありません。</p>
      </div>
    </section>
  </aside>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detail-modal" hidden>
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="detail-date"></h2>
      <button type="button" class="btn btn-secondary" id="detail-close">閉じる</button>
    </div>

    <div class="detail-nav">
      <button type="button" class="btn btn-secondary" id="detail-prev-day">← 前の日</button>
      <button type="button" class="btn btn-secondary" id="detail-next-day">次の日 →</button>
    </div>

    <div class="detail-row" id="detail-leave-row" hidden>
      <div class="detail-label">休暇区分</div>
      <div class="detail-value" id="detail-leave"></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">担当</div>
      <div class="detail-value" id="detail-tantou"></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">進捗率</div>
      <div class="detail-value" id="detail-progress"></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">作業状況および課題など</div>
      <div class="detail-value" id="detail-status"></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">今日新しく学んだこと</div>
      <div class="detail-value" id="detail-learned"></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">明日の作業</div>
      <div class="detail-value" id="detail-tomorrow"></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">その他</div>
      <div class="detail-value" id="detail-other"></div>
    </div>

    <div class="reply-block" id="detail-reply-section" hidden>
      <div class="detail-label">管理者からのリプライ　<span id="detail-reply-author"></span></div>
      <div class="reply-existing" id="detail-reply-text"></div>
    </div>

    <div class="detail-delete-row">
      <button type="button" class="btn btn-danger" id="detail-delete">この日の進捗を削除</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ja.js"></script>
<script src="https://cdn.jsdelivr.net/gh/osamutake/japanese-holidays-js@v1.0.10/lib/japanese-holidays.min.js"></script>
<script type="module" src="js/member.js"></script>
</body>
</html>
