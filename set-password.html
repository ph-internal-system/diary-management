<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>パスワード設定 | 日報管理</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="page">
  <div class="auth-card">
    <h1>初回パスワード設定</h1>

    <form id="setup-form">
      <div class="field">
        <label>メールアドレス</label>
        <input type="text" id="email-display" disabled />
      </div>
      <div class="field">
        <label for="password">新しいパスワード</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        <div class="hint">6文字以上で設定してください。</div>
      </div>
      <div class="field">
        <label for="password-confirm">新しいパスワード（確認）</label>
        <input type="password" id="password-confirm" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary" id="setup-btn">パスワードを設定してログイン</button>
      <div class="error-text" id="setup-error"></div>
    </form>
  </div>
</div>

<script type="module">
  import { fetchUserStatus, completeInitialPasswordSetup, pageForRole } from "./js/auth.js";

  const params = new URLSearchParams(location.search);
  const email = params.get("email") || "";

  const emailDisplay = document.getElementById("email-display");
  const form = document.getElementById("setup-form");
  const passwordInput = document.getElementById("password");
  const passwordConfirmInput = document.getElementById("password-confirm");
  const setupError = document.getElementById("setup-error");

  emailDisplay.value = email;

  (async () => {
    if (!email) {
      location.href = "index.html";
      return;
    }
    const status = await fetchUserStatus(email);
    if (!status || status.passwordSet) {
      // 未登録、または既にパスワード設定済みの場合はログイン画面へ
      location.href = "index.html";
    }
  })();

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setupError.textContent = "";

    if (passwordInput.value !== passwordConfirmInput.value) {
      setupError.textContent = "パスワードが一致しません。";
      return;
    }

    try {
      await completeInitialPasswordSetup(email, passwordInput.value);
      const status = await fetchUserStatus(email);
      location.href = pageForRole(status.role);
    } catch (err) {
      setupError.textContent = "パスワードの設定に失敗しました。時間をおいて再度お試しください。";
    }
  });
</script>
</body>
</html>
